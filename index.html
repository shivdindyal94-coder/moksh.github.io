<!DOCTYPE html>
<html>
<head>
<title>Ultimate Cool Pack</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: white;
    text-align: center;
    transition: 0.5s;
}

/* Dark & Light Mode */
.light {
    background: #f2f2f2;
    color: black;
}

/* Header */
h1 {
    margin-top: 30px;
    font-size: 45px;
    color: cyan;
    text-shadow: 0 0 10px cyan, 0 0 20px blue;
    animation: glow 2s infinite alternate;
}

/* Box */
.box {
    background: rgba(255,255,255,0.05);
    width: 320px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px magenta;
}

/* Buttons */
button {
    padding: 12px 22px;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    margin: 10px;
    cursor: pointer;
    background: cyan;
    color: black;
    transition: 0.3s;
}

button:hover {
    background: magenta;
    color: white;
    box-shadow: 0 0 15px magenta;
}

/* Animation */
@keyframes glow {
    from { text-shadow: 0 0 10px cyan; }
    to { text-shadow: 0 0 25px magenta; }
}

/* Hacker text */
.hacker {
    font-family: "Courier New", monospace;
    color: lime;
}

/* Light mode box */
.light .box {
    background: white;
    box-shadow: 0 0 10px gray;
}
</style>
</head>

<body id="body">

<h1>🔥 Ultimate Cool Pack 🔥</h1>
<p class="hacker">System Status: ONLINE</p>

<div class="box">
    <h2>Welcome 😎</h2>
    <p>This page has Dark Mode + Hacker + Gaming + Animation</p>

    <button onclick="alert('You clicked the cool button 😎')">Click Me</button>
    <button onclick="toggleMode()">🌙 Dark / ☀️ Light</button>
</div>

<div class="box">
    <h3>Features</h3>
    <p>✨ Glow Text</p>
    <p>💻 Hacker Style</p>
    <p>🎮 Gaming Look</p>
    <p>🌙 Dark Mode</p>
</div>

<script>
function toggleMode() {
    document.getElementById("body").classList.toggle("light");
}
</script>

</body>
</html>
